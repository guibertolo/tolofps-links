<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TOLOFPS · Links</title>
<meta name="description" content="Todos os links do TOLOFPS: Claimed, Twitch, Instagram, portfólio e apoio." />
<meta property="og:title" content="TOLOFPS" />
<meta property="og:description" content="Tibia, FPS e o jogo CLAIMED ao vivo. Todos os links num lugar só." />
<meta property="og:image" content="avatar.png" />
<meta name="theme-color" content="#0a140a" />
<link rel="icon" href="avatar.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#08120a; --bg2:#0d1f0c;
    --lime:#9ee60a; --lime-soft:#c4f56a;
    --gold:#ffd700; --ink:#eaf6df; --muted:#8fae7e;
    --card:#0f1d0c; --card-line:#2c4a1c;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--ink);
    background:var(--bg);
    min-height:100svh;
    display:flex;justify-content:center;
    padding:48px 20px 36px;
    position:relative;overflow-x:hidden;
  }
  /* fundo slime: blobs radiais + grão sutil */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(60% 50% at 18% 8%, rgba(158,230,10,.16), transparent 60%),
      radial-gradient(55% 45% at 88% 22%, rgba(120,200,30,.12), transparent 60%),
      radial-gradient(70% 60% at 50% 110%, rgba(40,90,16,.55), transparent 60%),
      linear-gradient(160deg,var(--bg),var(--bg2));
  }
  body::after{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.05;
    background-image:radial-gradient(rgba(255,255,255,.7) .5px,transparent .5px);
    background-size:4px 4px;
  }
  .wrap{position:relative;z-index:1;width:100%;max-width:440px;display:flex;flex-direction:column;align-items:center}

  .avatar{
    width:118px;height:118px;border-radius:50%;
    border:4px solid var(--lime);
    box-shadow:0 0 0 6px rgba(158,230,10,.12), 0 12px 30px rgba(0,0,0,.5);
    overflow:hidden;background:#16280f;
    animation:pop .6s cubic-bezier(.2,.9,.3,1.3) backwards;
  }
  .avatar img{width:100%;height:100%;object-fit:cover;display:block}

  h1{
    font-family:'Luckiest Guy',cursive;font-weight:400;
    font-size:clamp(2.4rem,11vw,3.1rem);letter-spacing:.04em;
    color:var(--lime);margin-top:18px;line-height:1;
    text-shadow:0 3px 0 #2f5417,0 6px 16px rgba(0,0,0,.45);
    animation:rise .5s ease .05s backwards;
  }
  .tag{
    color:var(--muted);font-size:.96rem;font-weight:600;margin-top:10px;text-align:center;
    animation:rise .5s ease .1s backwards;
  }

  .links{width:100%;display:flex;flex-direction:column;gap:13px;margin-top:30px}

  .btn{
    --accent:var(--lime);
    display:flex;align-items:center;gap:15px;
    width:100%;padding:16px 18px;
    background:var(--card);border:2px solid var(--card-line);border-radius:16px;
    color:var(--ink);text-decoration:none;font-weight:700;font-size:1.04rem;
    cursor:pointer;text-align:left;font-family:inherit;
    transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease,background .18s ease;
    animation:rise .5s ease backwards;
  }
  .btn:nth-child(1){animation-delay:.14s}
  .btn:nth-child(2){animation-delay:.20s}
  .btn:nth-child(3){animation-delay:.26s}
  .btn:nth-child(4){animation-delay:.32s}
  .btn:nth-child(5){animation-delay:.38s}
  .btn .ic{
    flex:0 0 44px;height:44px;display:grid;place-items:center;
    font-size:1.5rem;border-radius:12px;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);
  }
  .btn .txt{flex:1;display:flex;flex-direction:column;gap:2px;line-height:1.15}
  .btn .txt small{font-weight:600;color:var(--muted);font-size:.8rem}
  .btn .arr{color:var(--accent);font-size:1.15rem;transform:translateX(0);transition:transform .18s ease;opacity:.7}
  .btn:hover,.btn:focus-visible{
    transform:translateY(-3px);
    border-color:var(--accent);
    box-shadow:0 10px 26px rgba(0,0,0,.45),0 0 0 1px var(--accent) inset;
    outline:none;
  }
  .btn:hover .arr,.btn:focus-visible .arr{transform:translateX(4px);opacity:1}
  .btn:active{transform:translateY(-1px) scale(.99)}

  /* destaque CLAIMED */
  .btn-claimed{
    --accent:var(--gold);
    background:linear-gradient(135deg,#16280f,#241a06);
    border-color:#5a4410;
  }
  .btn-claimed .ic{background:rgba(255,215,0,.12);border-color:rgba(255,215,0,.25)}
  .btn-claimed .badge{
    margin-left:auto;align-self:flex-start;font-size:.64rem;font-weight:800;letter-spacing:.06em;
    color:#1a1405;background:var(--gold);padding:3px 7px;border-radius:99px;text-transform:uppercase;
    box-shadow:0 0 14px rgba(255,215,0,.35);
  }
  .btn-twitch{--accent:#bf94ff}
  .btn-insta{--accent:#ff7bd0}
  .btn-site{--accent:#7fd6ff}
  .btn-pix{--accent:var(--lime)}

  footer{margin-top:30px;color:var(--muted);font-size:.78rem;text-align:center;opacity:.8}

  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--lime);color:#0b1705;font-weight:800;font-size:.92rem;
    padding:12px 20px;border-radius:99px;box-shadow:0 10px 30px rgba(0,0,0,.5);
    opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease;z-index:5;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @keyframes rise{from{opacity:0;transform:translateY(14px)}}
  @keyframes pop{from{opacity:0;transform:scale(.85)}}
  @media (prefers-reduced-motion:reduce){
    .avatar,h1,.tag,.btn{animation:none}
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="avatar"><img src="avatar.png" alt="TOLOFPS" /></div>
    <h1>TOLOFPS</h1>
    <p class="tag">Tibia, FPS e o que mais pintar 🎮</p>

    <nav class="links">
      <a class="btn btn-claimed" href="https://claimedgame.com.br" target="_blank" rel="noopener">
        <span class="ic">🎮</span>
        <span class="txt">CLAIMED <small>O jogo de palavras da live</small></span>
        <span class="badge">ao vivo</span>
      </a>

      <a class="btn btn-twitch" href="https://twitch.tv/tolofps" target="_blank" rel="noopener">
        <span class="ic">🎥</span>
        <span class="txt">Twitch <small>Assista ao vivo</small></span>
        <span class="arr">→</span>
      </a>

      <a class="btn btn-insta" href="https://instagram.com/guibertolo" target="_blank" rel="noopener">
        <span class="ic">📸</span>
        <span class="txt">Instagram <small>@guibertolo</small></span>
        <span class="arr">→</span>
      </a>

      <a class="btn btn-site" href="https://guilhermebertolo.com.br" target="_blank" rel="noopener">
        <span class="ic">💼</span>
        <span class="txt">Portfólio <small>Meus projetos &amp; blog</small></span>
        <span class="arr">→</span>
      </a>

      <button class="btn btn-pix" id="pixBtn" type="button">
        <span class="ic">💚</span>
        <span class="txt">Apoie via PIX <small>Toque pra copiar a chave</small></span>
        <span class="arr">⧉</span>
      </button>
    </nav>

    <footer>© TOLOFPS · feito com 💚 pra galera da live</footer>
  </div>

  <div class="toast" id="toast">Chave PIX copiada! 💚</div>

  <script>
    (function(){
      var PIX='gui.rod93@hotmail.com';
      var btn=document.getElementById('pixBtn');
      var toast=document.getElementById('toast');
      var t;
      function show(msg){
        toast.textContent=msg;
        toast.classList.add('show');
        clearTimeout(t);
        t=setTimeout(function(){toast.classList.remove('show');},2200);
      }
      btn.addEventListener('click',function(){
        if(navigator.clipboard&&navigator.clipboard.writeText){
          navigator.clipboard.writeText(PIX).then(function(){show('Chave PIX copiada! 💚');})
          .catch(function(){show('PIX: '+PIX);});
        }else{
          var ta=document.createElement('textarea');ta.value=PIX;document.body.appendChild(ta);
          ta.select();try{document.execCommand('copy');show('Chave PIX copiada! 💚');}catch(e){show('PIX: '+PIX);}
          document.body.removeChild(ta);
        }
      });
    })();
  </script>
</body>
</html>
